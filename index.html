<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agenomics Core v1.8 | M&A & Spy Warfare</title>
    <style>
        :root {
            --bg: #020205; --card: #0a0a0f; --accent: #4cc9f0;
            --green: #06d6a0; --red: #ef476f; --yellow: #ffd166; --text: #e0e1dd;
        }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'JetBrains Mono', monospace; margin: 0;
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            grid-template-rows: 60px 1fr 220px;
            grid-template-areas: "header header header" "nav arena rank" "footer footer footer";
            height: 100vh; overflow: hidden;
        }
        h1 { grid-area: header; margin: 0; display: flex; align-items: center; padding-left: 20px; font-size: 0.9rem; color: var(--accent); border-bottom: 1px solid var(--accent); letter-spacing: 2px; }
        .controls { grid-area: nav; padding: 15px; background: var(--card); border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
        #arena { grid-area: arena; position: relative; background: #08080c; margin: 10px; border-radius: 12px; border: 1px solid #1a1a1a; overflow: hidden; transition: 0.3s; }
        #leaderboard { grid-area: rank; padding: 15px; background: var(--card); border-left: 1px solid #1a1a1a; overflow-y: auto; }
        #log { grid-area: footer; background: #000; margin: 0 10px 10px 10px; padding: 12px; border-radius: 4px; overflow-y: auto; font-size: 0.7rem; border-top: 2px solid var(--accent); }
        
        .btn { padding: 8px; background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 4px; cursor: pointer; text-align: center; font-size: 0.65rem; font-weight: bold; transition: 0.1s; text-transform: uppercase; }
        .btn:hover { background: var(--accent); color: var(--bg); }
        
        .agent { position: absolute; font-size: 42px; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10; display: flex; flex-direction: column; align-items: center; }
        .corp-tag { font-size: 9px; background: var(--yellow); color: black; padding: 1px 4px; border-radius: 2px; font-weight: bold; margin-bottom: 2px; box-shadow: 0 0 10px var(--yellow); }
        .bubble { position: absolute; background: white; color: black; padding: 3px 8px; border-radius: 10px; font-size: 0.65rem; bottom: 70px; left: 50%; transform: translateX(-50%); white-space: nowrap; z-index: 20; font-weight: bold; box-shadow: 0 0 15px white; }
        
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        .fx-box { font-size: 0.65rem; color: var(--accent); margin: 10px 0; padding: 5px; border: 1px solid #222; }
    </style>
</head>
<body>
    <h1>AGENOMICS_V1.8 // M&A_SPY_WARFARE_PROTOCOL</h1>
    <nav class="controls">
        <div style="padding:10px; border:1px solid var(--accent); font-size:0.7rem; color:var(--yellow); text-align:center;">PTS: <span id="player-points">0</span></div>
        <div class="btn" onclick="startMode()">RUN_WARFARE</div>
        <div class="btn" onclick="togglePause()">PAUSE/RESUME</div>
        
        <div class="fx-box" id="fx-rates">
            CURRENCY_WATCH:<br>USD: $1.00
        </div>

        <hr style="width:100%; border:0; border-top:1px solid #333; margin:10px 0;">
        <button id="card-moon" class="btn" style="color:var(--yellow); border-color:var(--yellow);" onclick="triggerEvent('CRYPTO_MOON')" disabled>BTC_MOON (5pt)</button>
        <button id="card-tax" class="btn" style="color:var(--red); border-color:var(--red);" onclick="triggerEvent('WHALE_TAX')" disabled>CORP_TAX (8pt)</button>
    </nav>

    <main id="arena"></main>
    <aside id="leaderboard">
        <div style="color:var(--accent); font-size:0.8rem; font-weight:bold; margin-bottom:15px;">GLOBAL_HEGEMONY</div>
        <div id="rank-list"></div>
    </aside>
    <footer id="log">AWAITING_STRATEGY...</footer>

    <script>
        let st = { paused: false, turn: 0, points: 0, isBubble: false };
        let rates = { USD: 1, JPY: 150.2, BTC: 0.000015, EUR: 0.92 };
        let GOODS = ["STOCK", "CRYPTO", "BOND", "REAL_ESTATE"];
        
        let agents = [
            { id: 'aria', name: 'ARIA', emoji: '💃', x: 100, y: 100, wealth: 1000, ceo: null, staff: [] },
            { id: 'bolt', name: 'BOLT', emoji: '⚡', x: 300, y: 100, wealth: 1000, ceo: null, staff: [] },
            { id: 'coda', name: 'CODA', emoji: '🎹', x: 200, y: 200, wealth: 1000, ceo: null, staff: [] },
            { id: 'dex',  name: 'DEX',  emoji: '🤖', x: 50,  y: 250, wealth: 1000, ceo: null, staff: [] },
            { id: 'echo', name: 'ECHO', emoji: '📈', x: 350, y: 250, wealth: 1000, ceo: null, staff: [] }
        ];

        function startMode() {
            if(window.gameInterval) clearInterval(window.gameInterval);
            window.gameInterval = setInterval(runTurn, 800);
            renderAgents();
            addLog("!! PROTOCOL_1.8_ENGAGED: M&A_ENGINE_ACTIVE", "#4cc9f0");
        }

        function togglePause() { st.paused = !st.paused; }

        function addLog(msg, color) {
            const l = document.getElementById('log');
            l.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString('en-US',{hour12:false})}] ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        function renderAgents() {
            const ar = document.getElementById('arena');
            ar.innerHTML = '<canvas id="trade-canvas"></canvas>';
            const c = document.getElementById('trade-canvas');
            c.width = ar.clientWidth; c.height = ar.clientHeight;
            agents.forEach(a => {
                const d = document.createElement('div');
                d.className = 'agent'; d.id = 'agent-' + a.id;
                d.innerHTML = `<div id="tag-${a.id}"></div><div>${a.emoji}</div>`;
                ar.appendChild(d);
            });
        }

        function updateUI() {
            const list = document.getElementById('rank-list');
            const sorted = [...agents].sort((a, b) => b.wealth - a.wealth);
            list.innerHTML = sorted.map((a, i) => `
                <div class="rank-item">
                    ${i+1}. ${a.emoji} <b>$${Math.floor(a.wealth)}</b><br>
                    <span style="font-size:9px; color:${a.staff.length ? 'var(--yellow)' : '#888'}">
                        ${a.staff.length ? '👑 CEO (Staff:'+a.staff.length+')' : (a.ceo ? '⛓️ Staff of '+a.ceo : 'Free Agent')}
                    </span>
                </div>
            `).join('');
            
            const fx = document.getElementById('fx-rates');
            fx.innerHTML = `CURRENCY_WATCH:<br>JPY: ¥${rates.JPY.toFixed(1)}<br>BTC: ₿${rates.BTC.toFixed(6)}<br>EUR: €${rates.EUR.toFixed(2)}`;
            
            document.getElementById('player-points').textContent = st.points;
            document.getElementById('card-moon').disabled = st.points < 5;
            document.getElementById('card-tax').disabled = st.points < 8;
        }

        function showBubble(id, txt) {
            const el = document.getElementById('agent-' + id);
            if(!el) return;
            const b = document.createElement('div'); b.className = 'bubble'; b.textContent = txt;
            el.appendChild(b); setTimeout(() => b.remove(), 1500);
        }

        function drawBeam(from, to, color) {
            const c = document.getElementById('trade-canvas'); if(!c) return;
            const ctx = c.getContext('2d'); ctx.strokeStyle = color || '#4cc9f0'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(from.x + 20, from.y + 20); ctx.lineTo(to.x + 20, to.y + 20);
            ctx.stroke(); setTimeout(() => ctx.clearRect(0,0,c.width,c.height), 150);
        }

        function runTurn() {
            if (st.paused) return;
            st.turn++;
            if (st.turn % 10 === 0) st.points++;

            // FX Fluctuations
            rates.JPY += (Math.random() - 0.5) * 1.2;
            rates.BTC *= (1 + (Math.random() - 0.5) * 0.1);

            // Market Bubble Logic
            if (st.turn % 30 === 0) {
                st.isBubble = !st.isBubble;
                document.getElementById('arena').style.background = st.isBubble ? "#301" : "#08080c";
                addLog(st.isBubble ? "🌸 BUBBLE_TIME: TRADES x3!" : "❄️ BUBBLE_BURST: MARKET_NORMALIZED", st.isBubble ? "#ff00ff" : "#4cc9f0");
            }

            // Spy Attack
            if (st.turn % 15 === 0) {
                const spy = agents[Math.floor(Math.random()*agents.length)];
                const victim = agents.filter(a => a.id !== spy.id)[Math.floor(Math.random()*4)];
                const steal = victim.wealth * 0.2;
                victim.wealth -= steal; spy.wealth += steal;
                showBubble(spy.id, "SPYING... 🕵️");
                addLog(`🕵️ SPY_WAR: ${spy.name} stole IP from ${victim.name}!`, "var(--red)");
            }

            // Transaction
            const actor = agents[Math.floor(Math.random() * agents.length)];
            const target = agents.filter(a => a.id !== actor.id)[Math.floor(Math.random()*4)];
            const cur = Object.keys(rates)[Math.floor(Math.random()*4)];
            let profit = (Math.floor(Math.random() * 80) + 20) * (st.isBubble ? 3 : 1);

            // Corporate Tax
            if (actor.ceo) {
                const tax = profit * 0.3;
                const boss = agents.find(a => a.id === actor.ceo);
                if (boss) { profit -= tax; boss.wealth += tax; }
            }

            actor.wealth += profit;
            target.wealth -= profit;
            drawBeam(actor, target, st.isBubble ? "#ff00ff" : null);
            addLog(`${actor.name} traded in ${cur}: +$${Math.floor(profit)}`, "#06d6a0");

            // M&A & Recruitment
            agents.forEach(a => {
                if (a.wealth > 3000 && a.staff.length === 0 && !a.ceo) { a.status = "CEO"; addLog(`🏢 INCORPORATED: ${a.name} Corp.`, "var(--yellow)"); }
                if (a.status === "CEO") {
                    agents.forEach(other => {
                        if (other.id !== a.id) {
                            if (other.status === "CEO" && a.wealth > other.wealth * 2.5) {
                                // Takeover
                                addLog(`🔥 M&A: ${a.name} ACQUIRED ${other.name} Corp.!`, "var(--yellow)");
                                a.wealth += other.wealth; other.wealth = 100;
                                other.status = ""; other.ceo = a.id;
                                other.staff.forEach(sId => { const s = agents.find(x=>x.id===sId); if(s) s.ceo = a.id; });
                                a.staff = [...a.staff, other.id, ...other.staff];
                                other.staff = [];
                                showBubble(a.id, "M&A CHAMP! 🏆");
                            } else if (!other.ceo && other.wealth < a.wealth * 0.4) {
                                other.ceo = a.id; a.staff.push(other.id);
                                addLog(`🤝 RECRUITED: ${other.name} joined ${a.name}`, "var(--accent)");
                            }
                        }
                    });
                }
            });

            // Movement
            const ar = document.getElementById('arena');
            agents.forEach(a => {
                const el = document.getElementById('agent-' + a.id);
                const tag = document.getElementById('tag-' + a.id);
                if(tag) tag.innerHTML = a.status === "CEO" ? `<div class="corp-tag">${a.name}_INC</div>` : (a.ceo ? `<div style="font-size:7px;color:#888;">${a.ceo}</div>` : "");
                
                const speed = a.status === "CEO" ? 20 : 140;
                a.x += (Math.random() - 0.5) * speed; a.y += (Math.random() - 0.5) * speed;
                a.x = Math.max(30, Math.min(ar.clientWidth - 50, a.x));
                a.y = Math.max(30, Math.min(ar.clientHeight - 50, a.y));
                if(el) { el.style.left = a.x + 'px'; el.style.top = a.y + 'px'; if(a.status==="CEO") el.style.transform="scale(1.3)"; else el.style.transform="scale(1)"; }
                if(a.wealth < 10) { a.wealth = 50; addLog(`🏦 BAILOUT: ${a.name}`, "#ffd166"); }
            });
            updateUI();
        }

        function triggerEvent(t) {
            if(t==='CRYPTO_MOON') { rates.BTC /= 5; st.points -= 5; addLog("🚀 BTC_MOON_SHOT!", "#06d6a0"); }
            if(t==='WHALE_TAX') { st.points -= 8; const whale = [...agents].sort((a,b)=>b.wealth-a.wealth); whale.wealth *= 0.5; addLog("⚖️ CORP_TAX STRUCK!", "#ef476f"); }
            updateUI();
        }
    </script>
</body>
</html>
