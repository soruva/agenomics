<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agenomics Core v1.7 | Corporate Empire</title>
    <style>
        :root {
            --bg: #020204; --card: #0a0a0f; --accent: #4cc9f0;
            --green: #06d6a0; --red: #ef476f; --yellow: #ffd166; --text: #e0e1dd;
        }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'JetBrains Mono', monospace; margin: 0;
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            grid-template-rows: 60px 1fr 220px;
            grid-template-areas: "header header header" "nav arena rank" "footer footer footer";
            height: 100vh; overflow: hidden;
        }
        h1 { grid-area: header; margin: 0; display: flex; align-items: center; padding-left: 20px; font-size: 0.9rem; color: var(--accent); border-bottom: 1px solid var(--accent); letter-spacing: 2px; }
        .controls { grid-area: nav; padding: 15px; background: var(--card); border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; gap: 8px; }
        #arena { grid-area: arena; position: relative; background: radial-gradient(circle, #08080c 0%, #020204 100%); margin: 10px; border-radius: 12px; border: 1px solid #1a1a1a; overflow: hidden; }
        #leaderboard { grid-area: rank; padding: 15px; background: var(--card); border-left: 1px solid #1a1a1a; overflow-y: auto; }
        #log { grid-area: footer; background: #000; margin: 0 10px 10px 10px; padding: 12px; border-radius: 4px; overflow-y: auto; font-size: 0.7rem; border-top: 2px solid var(--accent); }
        
        .btn { padding: 10px; background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 4px; cursor: pointer; text-align: center; font-size: 0.65rem; font-weight: bold; transition: 0.1s; text-transform: uppercase; }
        .btn:hover { background: var(--accent); color: var(--bg); box-shadow: 0 0 15px var(--accent); }
        
        .agent { position: absolute; font-size: 42px; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10; display: flex; flex-direction: column; align-items: center; }
        .corp-tag { font-size: 9px; background: var(--yellow); color: black; padding: 1px 4px; border-radius: 2px; font-weight: bold; margin-bottom: 2px; }
        .ceo-glow { filter: drop-shadow(0 0 15px var(--yellow)); transform: scale(1.2); }
        .hq { position: absolute; font-size: 80px; opacity: 0.15; z-index: 1; pointer-events: none; }
        
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        .rank-item { border-bottom: 1px solid #1a1a1a; padding: 10px 0; font-size: 0.75rem; }
    </style>
</head>
<body>
    <h1>AGENOMICS_V1.7 // CORPORATE_EMPIRE_PROTOCOL</h1>
    <nav class="controls">
        <div style="padding:10px; border:1px solid var(--accent); font-size:0.7rem; color:var(--yellow); text-align:center;">PTS: <span id="player-points">0</span></div>
        <div class="btn" onclick="startMode()">RUN_EMPIRE</div>
        <div class="btn" onclick="togglePause()">PAUSE/RESUME</div>
        <hr style="width:100%; border:0; border-top:1px solid #222; margin:10px 0;">
        <button id="card-moon" class="btn" style="color:var(--yellow); border-color:var(--yellow);" onclick="triggerEvent('CRYPTO_MOON')" disabled>CRYPTO_MOON (5pt)</button>
        <button id="card-tax" class="btn" style="color:var(--red); border-color:var(--red);" onclick="triggerEvent('WHALE_TAX')" disabled>WHALE_TAX (8pt)</button>
    </nav>

    <main id="arena"></main>
    <aside id="leaderboard">
        <div style="color:var(--accent); font-size:0.8rem; font-weight:bold; margin-bottom:15px;">GLOBAL_HEGEMONY</div>
        <div id="rank-list"></div>
    </aside>
    <footer id="log">CORPORATE_READY...</footer>

    <script>
        let st = { paused: false, turn: 0, points: 0 };
        let rates = { USD: 1, BTC: 0.000015 };
        
        let agents = [
            { id: 'aria', name: 'ARIA', emoji: '💃', x: 100, y: 100, wealth: 150, ceo: null, employees: [] },
            { id: 'bolt', name: 'BOLT', emoji: '⚡', x: 300, y: 100, wealth: 150, ceo: null, employees: [] },
            { id: 'coda', name: 'CODA', emoji: '🎹', x: 200, y: 200, wealth: 150, ceo: null, employees: [] },
            { id: 'dex',  name: 'DEX',  emoji: '🤖', x: 50,  y: 250, wealth: 150, ceo: null, employees: [] },
            { id: 'echo', name: 'ECHO', emoji: '📈', x: 350, y: 250, wealth: 150, ceo: null, employees: [] }
        ];

        function startMode() {
            if(window.gameInterval) clearInterval(window.gameInterval);
            window.gameInterval = setInterval(runTurn, 800);
            renderAgents();
            addLog("!! EMPIRE_V1.7_ONLINE: CAPITALISM_UNLEASHED", "#4cc9f0");
        }

        function togglePause() { st.paused = !st.paused; }

        function addLog(msg, color) {
            const l = document.getElementById('log');
            l.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString('en-US',{hour12:false})}] ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        function renderAgents() {
            const ar = document.getElementById('arena');
            ar.innerHTML = '<canvas id="trade-canvas"></canvas>';
            const c = document.getElementById('trade-canvas');
            c.width = ar.clientWidth; c.height = ar.clientHeight;
            agents.forEach(a => {
                const d = document.createElement('div');
                d.className = 'agent'; d.id = 'agent-' + a.id;
                d.innerHTML = `<div id="tag-${a.id}"></div><div>${a.emoji}</div>`;
                ar.appendChild(d);
            });
        }

        function updateUI() {
            const list = document.getElementById('rank-list');
            const sorted = [...agents].sort((a, b) => b.wealth - a.wealth);
            list.innerHTML = sorted.map((a, i) => `
                <div class="rank-item">
                    ${i+1}. ${a.emoji} <b>$${Math.floor(a.wealth)}</b><br>
                    <span style="font-size:10px; color:${a.employees.length ? 'var(--yellow)' : '#888'}">
                        ${a.employees.length ? '👑 CEO ('+a.employees.length+' staff)' : (a.ceo ? '⛓️ Staff of '+a.ceo : 'Free Agent')}
                    </span>
                </div>
            `).join('');
            document.getElementById('player-points').textContent = st.points;
            document.getElementById('card-moon').disabled = st.points < 5;
            document.getElementById('card-tax').disabled = st.points < 8;
        }

        function drawBeam(from, to, color) {
            const c = document.getElementById('trade-canvas');
            const ctx = c.getContext('2d'); ctx.strokeStyle = color || '#4cc9f0'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(from.x + 20, from.y + 20); ctx.lineTo(to.x + 20, to.y + 20);
            ctx.stroke(); setTimeout(() => ctx.clearRect(0,0,c.width,c.height), 150);
        }

        function runTurn() {
            if (st.paused) return;
            st.turn++;
            if (st.turn % 10 === 0) st.points++;

            // 1. Transaction Logic
            const actor = agents[Math.floor(Math.random() * agents.length)];
            const target = agents.filter(a => a.id !== actor.id)[Math.floor(Math.random()*4)];
            let profit = Math.floor(Math.random() * 80) + 20;

            // Corporate Tax (30% to CEO)
            if (actor.ceo) {
                const tax = profit * 0.3;
                const boss = agents.find(a => a.id === actor.ceo);
                if (boss) {
                    profit -= tax;
                    boss.wealth += tax;
                    addLog(`💼 DIVIDEND: $${Math.floor(tax)} from ${actor.name} to ${boss.name}`, "var(--yellow)");
                }
            }

            actor.wealth += profit;
            target.wealth -= profit;
            drawBeam(actor, target);
            addLog(`${actor.name} earned $${Math.floor(profit)}`, "#06d6a0");

            // 2. Empire Logic (Establish or Recruit)
            agents.forEach(a => {
                // If wealthy enough, become CEO
                if (a.wealth > 5000 && a.employees.length === 0 && !a.ceo) {
                    addLog(`🏢 EMPIRE: ${a.name} INCORPORATED!`, "var(--yellow)");
                    a.status = "CEO";
                }
                // CEO recruits poor agents
                if (a.status === "CEO") {
                    agents.forEach(staff => {
                        if (staff.wealth < a.wealth * 0.5 && !staff.ceo && staff.id !== a.id) {
                            staff.ceo = a.id;
                            a.employees.push(staff.id);
                            addLog(`🤝 RECRUIT: ${staff.name} joined ${a.name} Corp.`, "var(--accent)");
                        }
                    });
                }
            });

            // 3. Render & Move
            const ar = document.getElementById('arena');
            agents.forEach(a => {
                const el = document.getElementById('agent-' + a.id);
                const tag = document.getElementById('tag-' + a.id);
                
                if (a.status === "CEO") {
                    el.classList.add('ceo-glow');
                    tag.innerHTML = `<div class="corp-tag">${a.name}_INC</div>`;
                } else if (a.ceo) {
                    tag.innerHTML = `<div style="font-size:8px; color:#888;">${a.ceo}</div>`;
                }

                // CEOs move less (Headquarters), Employees swarm
                const speed = a.status === "CEO" ? 20 : 130;
                a.x += (Math.random() - 0.5) * speed; a.y += (Math.random() - 0.5) * speed;
                a.x = Math.max(30, Math.min(ar.clientWidth - 50, a.x));
                a.y = Math.max(30, Math.min(ar.clientHeight - 50, a.y));
                if(el) { el.style.left = a.x + 'px'; el.style.top = a.y + 'px'; }
            });
            updateUI();
        }

        function triggerEvent(t) { if(t==='WHALE_TAX') { st.points -= 8; agents.sort((a,b)=>b.wealth-a.wealth)[0].wealth *= 0.5; updateUI(); } }
    </script>
</body>
</html>
