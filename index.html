<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Agenomics Sandbox</title>
    <style>
        /* 最小限の見た目 */
        body { background: #111; color: #eee; font-family: sans-serif; padding: 20px; }
        #arena { width: 400px; height: 300px; border: 1px solid #444; position: relative; margin-bottom: 10px; overflow: hidden; }
        .agent { position: absolute; font-size: 24px; transition: all 0.5s; }
        .btn { padding: 10px; background: #333; color: white; cursor: pointer; display: inline-block; margin-right: 5px; }
        #log { height: 150px; overflow-y: scroll; border: 1px solid #222; font-size: 12px; padding: 5px; background: #000; }
    </style>
</head>
<body>

    <h1>Agenomics Prototype</h1>
    <div id="arena"></div> <!-- エージェントが動く場所 -->
    
    <div class="btn" onclick="startMode('normal')">ゲーム開始</div>
    <div class="btn" onclick="togglePause()">一時停止 / 再開</div>
    <div class="btn" onclick="showTab('main')">メイン</div>
    
    <div id="log">ここに取引ログが出ます...</div>

    <script>
        // --- 1. ここに「土台となる変数」を貼る (先ほどお出ししたもの) ---
        let st = { paused: false, turn: 0, round: 0, trades: 0 };
        let agents = [
            { id: 'aria', name: 'Aria', emoji: '💃', wealthUSD: 100, x: 50, y: 50, style: 'aggressive' },
            { id: 'bolt', name: 'Bolt', emoji: '⚡', wealthUSD: 100, x: 150, y: 50, style: 'conservative' }
        ];
        let GOODS = ["Stock", "Crypto"];
        let selAgent = 'aria';
        let currentMode = 'normal';
        let activeTab = 'main';
        let glitchCooldown = {};
        let glitchState = { winStreak: {}, newsRepeat: 0 };

        let cardCooldowns = {}; // カードの待ち時間を管理する空の箱を作る
        function runTurn() {
    if (st.paused) return;
    st.turn++;

    // 1. エージェントの状態を更新
    glitchState.agents = agents;
    agents.forEach(a => a.prevW = a.wealthUSD);

    // 2. クールダウンの処理
    Object.keys(cardCooldowns).forEach(k => {
        if (cardCooldowns[k] > 0) cardCooldowns[k]--;
    });

    // 3. Ariaのバグ判定 (祝杯モード)
    const aria = agents.find(a => a.id === 'aria');
    if (aria && aria.wealthUSD >= 200) {
        addLog("🍾 Aria: Too rich! Going to party... 🥂", "#FCD34D");
        aria.wealthUSD -= 60; 
        moveAgents(); // バグっていても位置だけは更新
        return; 
    }

    // 4. 経済ロジック (奪い合い)
    const actor = agents[Math.floor(Math.random() * agents.length)];
    const others = agents.filter(a => a.id !== actor.id);
    const target = others[Math.floor(Math.random() * others.length)]; 
    const good = GOODS[Math.floor(Math.random() * GOODS.length)]; 

    const amount = Math.floor(Math.random() * 40) + 10; 

    // 資産の移動
    actor.wealthUSD += amount;
    target.wealthUSD -= amount;

    // ログ出力
    addLog(`${actor.emoji} ${actor.name} bought ${good} from ${target.emoji} ${target.name}: +$${amount}`, "#15803D");
    addLog(`   💸 ${target.name} is now $${fmt(target.wealthUSD)}`, "#DC2626");

    // 5. 画面更新
    if (typeof moveAgents === 'function') moveAgents();
    if (typeof updateLB === 'function') updateLB();
    if (typeof updateMetrics === 'function') updateMetrics();
    if (typeof updateChart === 'function') updateChart();
}

        // --- 3. 足りない関数を埋める ---
        function startMode(mode) {
            console.log("Game Start: " + mode);
            setInterval(runTurn, 1000); // 1秒ごとに実行開始
            renderAgents();
        }

        function showTab(tab) { console.log("Tab: " + tab); }
        function addLog(msg, color) { 
            const l = document.getElementById('log');
            l.innerHTML += `<div style="color:${color}">${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }
        function fmt(n) { return Math.floor(n).toLocaleString(); }
        function moveAgents() {
            agents.forEach(a => {
        // 現在の位置にランダムな動きを加える
        a.x += (Math.random() - 0.5) * 40;
        a.y += (Math.random() - 0.5) * 40;

        // アリーナ（400x300）からはみ出さないようにガード
        a.x = Math.max(10, Math.min(360, a.x));
        a.y = Math.max(10, Math.min(260, a.y));
    });
    // 画面上の絵文字の位置を更新する
    renderAgents();
        }
        function updateLB() {} function updateMetrics() {} function updateChart() {}
        function showBubble(a, m, c) { addLog(`[Bubble] ${a.name}: ${m}`, c); }

        function renderAgents() {
            const ar = document.getElementById('arena');
            ar.innerHTML = '';
            agents.forEach(a => {
                const d = document.createElement('div');
                d.className = 'agent';
                d.style.left = a.x + 'px'; d.style.top = a.y + 'px';
                d.textContent = a.emoji;
                ar.appendChild(d);
            });
        }
        function togglePause() {
    st.paused = !st.paused; 
    console.log("Paused:", st.paused);
}
    </script>
</body>
</html>
