<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Agenomics Sandbox</title>
    <style>
        :root {
    --bg: #0a0a0f;
    --card: #16161e;
    --accent: #7aa2f7;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #c0caf5;
}

body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

h1 {
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-size: 1.5rem;
    margin: 20px 0;
    text-shadow: 0 0 10px rgba(122, 162, 247, 0.5);
}

/* アリーナ（砂場）のデザイン */
#arena {
    width: 90vw;
    max-width: 600px;
    height: 400px;
    background: radial-gradient(circle, #1a1b26 0%, #0a0a0f 100%);
    border: 1px solid rgba(122, 162, 247, 0.2);
    border-radius: 12px;
    position: relative;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 0 30px rgba(122, 162, 247, 0.1);
    overflow: hidden;
    margin-bottom: 20px;
}

/* ボタンのデザイン */
.controls { display: flex; gap: 10px; margin-bottom: 20px; }
.btn {
    padding: 10px 20px;
    background: var(--card);
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
    text-transform: uppercase;
    font-size: 0.8rem;
}
.btn:hover {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 15px var(--accent);
}

/* ログエリア */
#log {
    width: 90vw;
    max-width: 600px;
    height: 180px;
    background: var(--card);
    border-radius: 8px;
    padding: 15px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    overflow-y: scroll;
    border-top: 2px solid var(--accent);
}

/* ランキングボード */
#leaderboard {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(22, 22, 30, 0.9);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 10px;
    border: 1px solid rgba(122, 162, 247, 0.3);
    min-width: 140px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* エージェントのアニメーション */
.agent {
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
}
 </style>
</head>
<body>

    <h1>Agenomics Prototype</h1>
    <div id="arena"></div> <!-- エージェントが動く場所 -->
    
    <div class="btn" onclick="startMode('normal')">ゲーム開始</div>
    <div class="btn" onclick="togglePause()">一時停止 / 再開</div>
    <div class="btn" onclick="showTab('main')">メイン</div>
    
    <div id="log">ここに取引ログが出ます...</div>

    <script>
// --- 1. 全ての変数をここで定義 (不足エラーを防ぐ) ---
let st = { paused: false, turn: 0, round: 0, trades: 0 };
let agents = [
    { id: 'aria', name: 'Aria', emoji: '💃', wealthUSD: 100, x: 50, y: 50, style: 'aggressive' },
    { id: 'bolt', name: 'Bolt', emoji: '⚡', wealthUSD: 100, x: 150, y: 50, style: 'conservative' }
];
let GOODS = ["Stock", "Crypto", "Bond", "Gold"];
let selAgent = 'aria';
let currentMode = 'normal';
let activeTab = 'main';
let glitchCooldown = {};
let glitchState = { winStreak: {}, newsRepeat: 0, prevNewsId: null };
let cardCooldowns = {};

// --- 2. ボタンや表示用の関数 ---
function startMode(mode) {
    console.log("🚀 Game Start: " + mode);
    currentMode = mode;
    // 重複実行を防ぐ
    if(window.gameInterval) clearInterval(window.gameInterval);
    window.gameInterval = setInterval(runTurn, 1000);
    renderAgents();
}

function togglePause() {
    st.paused = !st.paused;
    addLog(st.paused ? "⏸ 一時停止" : "▶️ 再開", "#EAB308");
}

function showTab(tab) { console.log("Tab: " + tab); }

function fmt(n) { return Math.floor(n).toLocaleString(); }

function addLog(msg, color) {
    const l = document.getElementById('log');
    if(l) {
        l.innerHTML += `<div style="color:${color}; margin-bottom:2px;">${msg}</div>`;
        l.scrollTop = l.scrollHeight;
    }
}

// --- 3. ランキング表示 (Leaderboard) ---
function updateLB() {
    let lb = document.getElementById('leaderboard');
    if(!lb) {
        lb = document.createElement('div');
        lb.id = 'leaderboard';
        lb.style = "position:fixed; top:20px; right:20px; background:rgba(0,0,0,0.8); padding:10px; border:1px solid #444; color:white; font-family:monospace; min-width:120px; z-index:100;";
        document.body.appendChild(lb);
    }
    const sorted = [...agents].sort((a, b) => b.wealthUSD - a.wealthUSD);
    lb.innerHTML = '<div style="border-bottom:1px solid #666; margin-bottom:5px; font-weight:bold;">RANKING</div>' + 
        sorted.map((a, i) => `<div>${i+1}. ${a.emoji} $${fmt(a.wealthUSD)}</div>`).join('');
}

// --- 4. エージェントの移動と描画 ---
function moveAgents() {
    agents.forEach(a => {
        a.x += (Math.random() - 0.5) * 60;
        a.y += (Math.random() - 0.5) * 60;
        a.x = Math.max(10, Math.min(350, a.x));
        a.y = Math.max(10, Math.min(250, a.y));
    });
    renderAgents();
}

function renderAgents() {
    const ar = document.getElementById('arena');
    if(!ar) return;
    ar.innerHTML = '';
    agents.forEach(a => {
        const d = document.createElement('div');
        d.style = `position:absolute; left:${a.x}px; top:${a.y}px; font-size:32px; transition: all 0.5s ease-out;`;
        d.textContent = a.emoji;
        ar.appendChild(d);
    });
}

// --- 5. メインエンジン (runTurn) ---
function runTurn() {
    if (st.paused) return;
    st.turn++;

    // セーフティネット (破産防止)
    agents.forEach(a => { 
        if(a.wealthUSD < 10) {
            a.wealthUSD = 50; 
            addLog(`🏦 中央銀行が ${a.emoji}${a.name} を救済! (+$50)`, "#EAB308");
        }
    });

    // Ariaのバグ判定
    const aria = agents.find(a => a.id === 'aria');
    if (aria && aria.wealthUSD >= 250) {
        addLog(`🍾 Aria: 儲けすぎたわ！飲みに行く！🥂`, "#FCD34D");
        aria.wealthUSD -= 80; // 豪遊代
        moveAgents();
        updateLB();
        return; 
    }

    // 取引ロジック (奪い合い)
    const actor = agents[Math.floor(Math.random() * agents.length)];
    const target = agents.find(a => a.id !== actor.id);
    const good = GOODS[Math.floor(Math.random() * GOODS.length)];
    const amount = Math.floor(Math.random() * 40) + 10;

    actor.wealthUSD += amount;
    target.wealthUSD -= amount;

    addLog(`${actor.emoji}${actor.name}が${target.name}から${good}を購入: +$${amount}`, "#10b981");
    addLog(`   💸 ${target.name}の残高: $${fmt(target.wealthUSD)}`, "#f87171");

    moveAgents();
    updateLB();
}   
    </script>
</body>
</html>
