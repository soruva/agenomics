<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AGENOMICS v4.0 — Economic Simulation Engine</title>

<style>
:root { --bg:#050508; --card:#0d0d14; --accent:#4cc9f0; --green:#06d6a0; --red:#ef476f; --yellow:#ffd166; --text:#e0e1dd; }
body { background:var(--bg); color:var(--text); font-family:monospace; margin:0;
display:grid; grid-template-columns:280px 1fr 280px; grid-template-rows:60px 1fr 220px;
grid-template-areas:"header header header" "nav arena rank" "footer footer footer"; height:100vh; overflow:hidden; }

h1 { grid-area:header; padding-left:20px; display:flex; align-items:center; font-size:0.85rem; color:var(--accent); border-bottom:1px solid #222; }

.controls { grid-area:nav; background:var(--card); padding:15px; display:flex; flex-direction:column; gap:8px; }
#arena { grid-area:arena; position:relative; margin:10px; border-radius:10px; border:1px solid #222; }
#leaderboard { grid-area:rank; background:var(--card); padding:15px; }
#log { grid-area:footer; background:#000; margin:10px; padding:10px; font-size:11px; overflow:auto; }

.agent { position:absolute; font-size:36px; transition:0.5s; }

.selector-box { background:#000; border:1px solid #333; padding:8px; }
.btn { border:1px solid var(--accent); color:var(--accent); padding:8px; cursor:pointer; font-size:11px; }

#insight-panel {
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,0.8);
border:1px solid #333;
padding:10px;
font-size:11px;
border-radius:6px;
z-index:100;
}
</style>
</head>

<body>

<h1>AGENOMICS — ECONOMIC SIMULATION</h1>

<nav class="controls">

<div class="selector-box">
TAX RATE<br>
<input type="range" id="tax-slider" min="0" max="50" value="10">
<div>Tax: <span id="tax-value">10%</span></div>
</div>

<div class="btn" onclick="start()">START</div>

</nav>

<main id="arena">
<div id="insight-panel">
<div style="color:#4cc9f0;">INSIGHT</div>
<div id="insight-content">Loading...</div>
</div>
</main>

<aside id="leaderboard">
<div id="rank"></div>
</aside>

<footer id="log"></footer>

<script>

let TAX_RATE = 0.1;

document.getElementById('tax-slider').oninput = function(){
TAX_RATE = this.value / 100;
document.getElementById('tax-value').textContent = this.value + '%';
};

let agents = [
{id:'a',emoji:'💃',x:100,y:100,w:500},
{id:'b',emoji:'⚡',x:300,y:100,w:500},
{id:'c',emoji:'🎹',x:200,y:200,w:500},
{id:'d',emoji:'🤖',x:50,y:250,w:500},
{id:'e',emoji:'📈',x:350,y:250,w:500}
];

function render(){
const ar = document.getElementById('arena');
ar.querySelectorAll('.agent').forEach(e=>e.remove());

agents.forEach(a=>{
const d=document.createElement('div');
d.className='agent';
d.style.left=a.x+'px';
d.style.top=a.y+'px';
d.innerHTML=a.emoji;
ar.appendChild(d);
});
}

function log(t){
const l=document.getElementById('log');
l.innerHTML+=t+"<br>";
l.scrollTop=l.scrollHeight;
}

function updateInsights(){
const total = agents.reduce((s,a)=>s+a.w,0);
const max = Math.max(...agents.map(a=>a.w));
const min = Math.min(...agents.map(a=>a.w));

const inequality = ((max-min)/total*100).toFixed(1);

document.getElementById('insight-content').innerHTML = `
Inequality: ${inequality}%<br>
Top Share: ${((max/total)*100).toFixed(1)}%<br>
Tax: ${(TAX_RATE*100).toFixed(0)}%
`;
}

function step(){

let a = agents[Math.floor(Math.random()*agents.length)];
let b = agents[Math.floor(Math.random()*agents.length)];

if(a===b) return;

let profit = Math.random()*100;

// tax
let tax = profit * TAX_RATE;
profit -= tax;

// redistribute
agents.forEach(x=>x.w += tax/agents.length);

a.w += profit;
b.w -= profit;

// move
agents.forEach(x=>{
x.x += (Math.random()-0.5)*50;
x.y += (Math.random()-0.5)*50;
});

updateInsights();
render();
}

function start(){
setInterval(step,500);
render();
}

</script>

</body>
</html>
