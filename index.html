<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agenomics Architecture | Agentic Economy Sandbox</title>
    <style>
        :root {
            --bg: #050508;
            --card: #12121a;
            --accent: #4cc9f0;
            --green: #06d6a0;
            --red: #ef476f;
            --yellow: #ffd166;
            --text: #e0e1dd;
            --border: rgba(76, 201, 240, 0.2);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', 'Monaco', 'Consolas', monospace;
            margin: 0;
            display: grid;
            grid-template-columns: 220px 1fr 240px;
            grid-template-rows: 50px 1fr 180px;
            grid-template-areas: 
                "header header header"
                "nav arena rank"
                "footer footer footer";
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            grid-area: header;
            margin: 0;
            display: flex;
            align-items: center;
            padding-left: 20px;
            font-size: 0.9rem;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .controls { 
            grid-area: nav;
            padding: 20px;
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #arena {
            grid-area: arena;
            position: relative;
            background: radial-gradient(circle at center, #10101a 0%, #050508 100%);
            margin: 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        #leaderboard {
            grid-area: rank;
            padding: 20px;
            background: var(--card);
            border-left: 1px solid var(--border);
        }

        #log {
            grid-area: footer;
            background: #000;
            margin: 0 10px 10px 10px;
            padding: 12px;
            border-radius: 2px;
            overflow-y: auto;
            font-size: 0.75rem;
            border-top: 1px solid var(--accent);
            line-height: 1.4;
        }

        .btn {
            padding: 10px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 2px;
            cursor: pointer;
            text-align: center;
            font-size: 0.7rem;
            font-weight: bold;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 10px var(--accent);
        }

        .agent { 
            position: absolute; 
            font-size: 38px; 
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.1));
            user-select: none;
        }

        #rank-list div {
            margin-bottom: 10px;
            padding: 5px;
            border-bottom: 1px solid #222;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
        /* 取引時のフラッシュエフェクト */
.flash {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(76, 201, 240, 0.1);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    z-index: 5;
}
/* エージェントの吹き出し */
.bubble {
    position: absolute;
    background: var(--card);
    border: 1px solid var(--accent);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.6rem;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    z-index: 20;
    color: var(--accent);
}
    </style>
</head>
<body>

    <h1>AGENOMICS_CORE_V1.0</h1>

    <nav class="controls">
        <div class="btn" onclick="startMode('normal')">RUN_SYSTEM</div>
        <div class="btn" onclick="togglePause()">PAUSE/RESUME</div>
        <div class="btn" onclick="showTab('main')">DASHBOARD</div>
    </nav>

    <main id="arena"></main>

    <aside id="leaderboard">
        <div style="color:var(--accent); font-size:0.8rem; font-weight:bold; margin-bottom:15px; letter-spacing:1px;">ACTIVE_RANKINGS</div>
        <div id="rank-list"></div>
    </aside>

    <footer id="log">SYSTEM_INITIALIZED: WAITING_FOR_INPUT...</footer>

    <script>
        // --- DATA_MODEL ---
        let st = { paused: false, turn: 0, round: 0, trades: 0 };
        let agents = [
            { id: 'aria', name: 'ARIA', emoji: '💃', wealthUSD: 100, x: 100, y: 100, style: 'aggressive' },
            { id: 'bolt', name: 'BOLT', emoji: '⚡', wealthUSD: 100, x: 300, y: 100, style: 'conservative' }
        ];
        let GOODS = ["EQUITIES", "CRYPTO", "COMMODITIES", "FOREX"];
        let currentMode = 'normal';
        let cardCooldowns = {};
        let glitchState = { winStreak: {}, newsRepeat: 0 };

        // --- SYSTEM_CONTROLS ---
        function startMode(mode) {
            console.log("SYSTEM_START: " + mode);
            if(window.gameInterval) clearInterval(window.gameInterval);
            window.gameInterval = setInterval(runTurn, 1000);
            renderAgents();
            addLog("CORE_ENGINE_STARTED: MODE_" + mode.toUpperCase(), "#4cc9f0");
        }

        function togglePause() {
            st.paused = !st.paused;
            addLog(st.paused ? "!! SYSTEM_HALTED" : ">> SYSTEM_RESUMED", "#ffd166");
        }

        function addLog(msg, color) {
            const l = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString('en-US', { hour12: false });
            l.innerHTML += `<div style="color:${color}">[${timestamp}] ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        function fmt(n) { return Math.floor(n).toLocaleString(); }

        // --- VISUAL_ENGINE ---
        function renderAgents() {
            const ar = document.getElementById('arena');
            ar.innerHTML = '';
            agents.forEach(a => {
                const d = document.createElement('div');
                d.className = 'agent';
                d.style.left = a.x + 'px';
                d.style.top = a.y + 'px';
                d.textContent = a.emoji;
                ar.appendChild(d);
            });
        }

        function moveAgents() {
            const ar = document.getElementById('arena');
            const w = ar.clientWidth - 60;
            const h = ar.clientHeight - 60;
            agents.forEach(a => {
                a.x += (Math.random() - 0.5) * 120;
                a.y += (Math.random() - 0.5) * 120;
                a.x = Math.max(30, Math.min(w, a.x));
                a.y = Math.max(30, Math.min(h, a.y));
            });
            renderAgents();
        }

        function updateLB() {
            const list = document.getElementById('rank-list');
            const sorted = [...agents].sort((a, b) => b.wealthUSD - a.wealthUSD);
            list.innerHTML = sorted.map((a, i) => 
                `<div>${i+1}. ${a.emoji} $${fmt(a.wealthUSD)}</div>`
            ).join('');
        }

        // --- CORE_LOGIC ---
        function runTurn() {
            if (st.paused) return;
            st.turn++;

            // Safety Net: Central Bank Intervention
            agents.forEach(a => { 
                if(a.wealthUSD < 15) {
                    a.wealthUSD = 60; 
                    addLog(`[RESCUE] CENTRAL_BANK INJECTED $60 LIQUIDITY INTO ${a.name}`, "#ffd166");
                }
            });

            // Glitch: ARIA's Party Mode (Profit Threshold)
            const aria = agents.find(a => a.id === 'aria');
            if (aria && aria.wealthUSD >= 280) {
                addLog(`[GLITCH] ARIA: EXCESS_PROFIT_DETECTED. EXITING_MARKET_FOR_CELEBRATION 🥂`, "#ffd166");
                aria.wealthUSD -= 90;
                moveAgents(); updateLB(); return;
            }

            // Market Transaction
            const actor = agents[Math.floor(Math.random() * agents.length)];
            const target = agents.find(a => a.id !== actor.id);
            const item = GOODS[Math.floor(Math.random() * GOODS.length)];
            const amount = Math.floor(Math.random() * 45) + 15;

            actor.wealthUSD += amount;
            target.wealthUSD -= amount;

            addLog(`${actor.name} EXECUTED ${item}_TRADE: +$${amount}`, "#06d6a0");
            addLog(`>> ${target.name} POSITION_DECREASED: -$${amount}`, "#ef476f");

            moveAgents();
            updateLB();
        }
        
        function showTab(t) { console.log("NAVIGATE_TO:", t); }
    </script>
</body>
</html>
