<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Agenomics Sandbox</title>
    <style>
        /* 最小限の見た目 */
        body { background: #111; color: #eee; font-family: sans-serif; padding: 20px; }
        #arena { width: 400px; height: 300px; border: 1px solid #444; position: relative; margin-bottom: 10px; overflow: hidden; }
        .agent { position: absolute; font-size: 24px; transition: all 0.5s; }
        .btn { padding: 10px; background: #333; color: white; cursor: pointer; display: inline-block; margin-right: 5px; }
        #log { height: 150px; overflow-y: scroll; border: 1px solid #222; font-size: 12px; padding: 5px; background: #000; }
        #arena { width: 100%; height: 300px; border: 2px solid #333; position: relative; background: #1a1a1a; overflow: hidden; }
.agent-container { position: absolute; transition: all 0.5s ease-out; text-align: center; }
.agent-icon { font-size: 32px; }
.wealth-bar { width: 40px; height: 4px; background: #444; margin-top: 2px; border-radius: 2px; overflow: hidden; }
.wealth-fill { height: 100%; background: #10b981; transition: width 0.3s; }
#leaderboard { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #444; width: 150px; }
.bubble { position: absolute; background: white; color: black; padding: 5px 10px; border-radius: 15px; font-size: 12px; bottom: 50px; left: 50%; transform: translateX(-50%); white-space: nowrap; z-index: 10; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Agenomics Prototype</h1>
    <div id="arena"></div> <!-- エージェントが動く場所 -->
    
    <div class="btn" onclick="startMode('normal')">ゲーム開始</div>
    <div class="btn" onclick="togglePause()">一時停止 / 再開</div>
    <div class="btn" onclick="showTab('main')">メイン</div>
    
    <div id="log">ここに取引ログが出ます...</div>

    <script>
// --- 1. 全ての変数をここで定義 (不足エラーを防ぐ) ---
let st = { paused: false, turn: 0, round: 0, trades: 0 };
let agents = [
    { id: 'aria', name: 'Aria', emoji: '💃', wealthUSD: 100, x: 50, y: 50, style: 'aggressive' },
    { id: 'bolt', name: 'Bolt', emoji: '⚡', wealthUSD: 100, x: 150, y: 50, style: 'conservative' }
];
let GOODS = ["Stock", "Crypto", "Bond", "Gold"];
let selAgent = 'aria';
let currentMode = 'normal';
let activeTab = 'main';
let glitchCooldown = {};
let glitchState = { winStreak: {}, newsRepeat: 0, prevNewsId: null };
let cardCooldowns = {};

// --- 2. ボタンや表示用の関数 ---
function startMode(mode) {
    console.log("🚀 Game Start: " + mode);
    currentMode = mode;
    // 重複実行を防ぐ
    if(window.gameInterval) clearInterval(window.gameInterval);
    window.gameInterval = setInterval(runTurn, 1000);
    renderAgents();
}

function togglePause() {
    st.paused = !st.paused;
    addLog(st.paused ? "⏸ 一時停止" : "▶️ 再開", "#EAB308");
}

function showTab(tab) { console.log("Tab: " + tab); }

function fmt(n) { return Math.floor(n).toLocaleString(); }

function addLog(msg, color) {
    const l = document.getElementById('log');
    if(l) {
        l.innerHTML += `<div style="color:${color}; margin-bottom:2px;">${msg}</div>`;
        l.scrollTop = l.scrollHeight;
    }
}

// --- 3. ランキング表示 (Leaderboard) ---
function updateLB() {
    let lb = document.getElementById('leaderboard');
    if(!lb) {
        lb = document.createElement('div');
        lb.id = 'leaderboard';
        lb.style = "position:fixed; top:20px; right:20px; background:rgba(0,0,0,0.8); padding:10px; border:1px solid #444; color:white; font-family:monospace; min-width:120px; z-index:100;";
        document.body.appendChild(lb);
    }
    const sorted = [...agents].sort((a, b) => b.wealthUSD - a.wealthUSD);
    lb.innerHTML = '<div style="border-bottom:1px solid #666; margin-bottom:5px; font-weight:bold;">RANKING</div>' + 
        sorted.map((a, i) => `<div>${i+1}. ${a.emoji} $${fmt(a.wealthUSD)}</div>`).join('');
}

// --- 4. エージェントの移動と描画 ---
function moveAgents() {
    agents.forEach(a => {
        a.x += (Math.random() - 0.5) * 60;
        a.y += (Math.random() - 0.5) * 60;
        a.x = Math.max(10, Math.min(350, a.x));
        a.y = Math.max(10, Math.min(250, a.y));
    });
    renderAgents();
}

function renderAgents() {
    const ar = document.getElementById('arena');
    if(!ar) return;
    ar.innerHTML = '';
    agents.forEach(a => {
        const d = document.createElement('div');
        d.style = `position:absolute; left:${a.x}px; top:${a.y}px; font-size:32px; transition: all 0.5s ease-out;`;
        d.textContent = a.emoji;
        ar.appendChild(d);
    });
}

// --- 5. メインエンジン (runTurn) ---
function runTurn() {
    if (st.paused) return;
    st.turn++;

    // セーフティネット (破産防止)
    agents.forEach(a => { 
        if(a.wealthUSD < 10) {
            a.wealthUSD = 50; 
            addLog(`🏦 中央銀行が ${a.emoji}${a.name} を救済! (+$50)`, "#EAB308");
        }
    });

    // Ariaのバグ判定
    const aria = agents.find(a => a.id === 'aria');
    if (aria && aria.wealthUSD >= 250) {
        addLog(`🍾 Aria: 儲けすぎたわ！飲みに行く！🥂`, "#FCD34D");
        aria.wealthUSD -= 80; // 豪遊代
        moveAgents();
        updateLB();
        return; 
    }

    // 取引ロジック (奪い合い)
    const actor = agents[Math.floor(Math.random() * agents.length)];
    const target = agents.find(a => a.id !== actor.id);
    const good = GOODS[Math.floor(Math.random() * GOODS.length)];
    const amount = Math.floor(Math.random() * 40) + 10;

    actor.wealthUSD += amount;
    target.wealthUSD -= amount;

    addLog(`${actor.emoji}${actor.name}が${target.name}から${good}を購入: +$${amount}`, "#10b981");
    addLog(`   💸 ${target.name}の残高: $${fmt(target.wealthUSD)}`, "#f87171");

    moveAgents();
    updateLB();
}   
    </script>
</body>
</html>
