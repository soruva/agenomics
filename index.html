<!DOCTYPE html>  <html lang="en">    <head>    
    <meta charset="UTF-8">    
    <title>Agenomics Core v3.0 | CEO Empire & Resilience</title>    
    <style>    
        :root { --bg: #050508; --card: #0d0d14; --accent: #4cc9f0; --green: #06d6a0; --red: #ef476f; --yellow: #ffd166; --text: #e0e1dd; }    
        body { background-color: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; margin: 0; display: grid; grid-template-columns: 280px 1fr 280px; grid-template-rows: 60px 1fr 220px; grid-template-areas: "header header header" "nav arena rank" "footer footer footer"; height: 100vh; overflow: hidden; }    
        h1 { grid-area: header; margin: 0; display: flex; align-items: center; padding-left: 20px; font-size: 0.85rem; color: var(--accent); border-bottom: 1px solid rgba(76,201,240,0.2); letter-spacing: 2px; }    
        .controls { grid-area: nav; padding: 15px; background: var(--card); border-right: 1px solid #222; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }    
        #arena { grid-area: arena; position: relative; background: #08080c; margin: 10px; border-radius: 12px; border: 1px solid #222; overflow: hidden; transition: background 1s; }    
        #leaderboard { grid-area: rank; padding: 15px; background: var(--card); border-left: 1px solid #222; overflow-y: auto; }    
        #log { grid-area: footer; background: #000; margin: 0 10px 10px 10px; padding: 12px; border-radius: 4px; overflow-y: auto; font-size: 0.7rem; border-top: 2px solid var(--accent); }    
        .selector-box { background: #000; border: 1px solid #333; padding: 8px; margin-bottom: 5px; border-radius: 4px; }    
        .currency-btn { padding: 4px 8px; font-size: 0.6rem; border: 1px solid var(--accent); color: var(--accent); background: transparent; cursor: pointer; margin: 2px; border-radius: 2px; }    
        .currency-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 10px var(--accent); }    
        .btn { padding: 8px; background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 4px; cursor: pointer; text-align: center; font-size: 0.6rem; font-weight: bold; transition: 0.2s; text-transform: uppercase; }    
        .btn:hover:not(:disabled) { background: var(--accent); color: var(--bg); }    
        .btn:disabled { opacity: 0.1; cursor: not-allowed; }    
        .agent { position: absolute; font-size: 40px; transition: all 0.7s ease-out; z-index: 10; display: flex; flex-direction: column; align-items: center; pointer-events: none; }    
        .ceo-tag { font-size: 10px; background: var(--yellow); color: black; padding: 1px 4px; border-radius: 3px; font-weight: bold; margin-bottom: 2px; box-shadow: 0 0 8px var(--yellow); }    
        .inventory { display: flex; gap: 2px; font-size: 12px; margin-top: -5px; }    
        .bubble { position: absolute; background: white; color: black; padding: 4px 10px; border-radius: 10px; font-size: 0.65rem; bottom: 65px; left: 50%; transform: translateX(-50%); white-space: nowrap; z-index: 20; font-weight: bold; box-shadow: 0 0 15px white; }    
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }    
    </style>    
</head>    
<body>    
    <h1>AGENOMICS_V3.0 // CORPORATE_EVOLUTION</h1>    
    <nav class="controls">    
        <div class="selector-box">    
            <div style="font-size:0.5rem; color:#888; margin-bottom:4px;">BASE_CURRENCY</div>    
            <button class="currency-btn active" id="btn-USD" onclick="setBase('USD')">USD</button>    
            <button class="currency-btn" id="btn-JPY" onclick="setBase('JPY')">JPY</button>    
            <button class="currency-btn" id="btn-BTC" onclick="setBase('BTC')">BTC</button>    
            <button class="currency-btn" id="btn-EUR" onclick="setBase('EUR')">EUR</button>    
        </div>    
        <div style="padding: 8px; border: 1px solid var(--accent); font-size: 0.7rem; color: var(--yellow); text-align: center;">PTS: <span id="player-points">0</span></div>    
        <div class="btn" onclick="startMode(800)">RUN_NORMAL</div>    
        <div class="btn" onclick="startMode(150)">HYPER_SPEED</div>    
        <div class="btn" onclick="togglePause()">PAUSE/RESUME</div>    
        <div style="font-size:0.6rem; color:var(--accent); margin-top:10px;">FX_LIVE: <span id="fx-status"></span></div>    
        <hr style="width:100%; border:0; border-top:1px solid #333; margin:10px 0;">    
        <button id="card-moon" class="btn" style="color:var(--yellow); border-color:var(--yellow);" onclick="triggerEvent('BTC_PUMP')" disabled>BTC_PUMP (5pt)</button>    
        <button id="card-tax" class="btn" style="color:var(--red); border-color:var(--red); margin-top:5px;" onclick="triggerEvent('EQUILIBRIUM')" disabled>WHALE_TAX (8pt)</button>    
        <div class="btn" onclick="downloadLog()">EXPORT</div>
        <div class="btn" onclick="shareSim()">SHARE</div> 
    </nav>    
    <main id="arena"></main>    
    <aside id="leaderboard"><div id="rank-list" style="font-size: 0.8rem; font-weight: bold;"></div></aside>    
    <footer id="log">SYSTEM_V3_REBOOTED...</footer>  <script>    
    let st = { paused: false, turn: 0, points: 0, speed: 800, base: 'USD', symbol: '$', isBubble: false };    
    let rates = { USD: 1, JPY: 150.0, EUR: 0.92, BTC: 0.000015 };    
    const SYMBOLS = { USD: '$', JPY: '¥', BTC: '₿', EUR: '€' };    
    const DREAMS = [ {c:200, e:"⌚"}, {c:1000, e:"🏎️"}, {c:5000, e:"🏰"}, {c:20000, e:"🚀"} ];    let agents = [    
    { id: 'aria', name: 'ARIA', emoji: '💃', x: 100, y: 100, wealthUSD: 500, items: [], status: 'TRADER', staff: [] },    
    { id: 'bolt', name: 'BOLT', emoji: '⚡', x: 300, y: 100, wealthUSD: 500, items: [], status: 'TRADER', staff: [] },    
    { id: 'coda', name: 'CODA', emoji: '🎹', x: 200, y: 200, wealthUSD: 500, items: [], status: 'TRADER', staff: [] },    
    { id: 'dex',  name: 'DEX',  emoji: '🤖', x: 50,  y: 250, wealthUSD: 500, status: 'TRADER', staff: [] },    
    { id: 'echo', name: 'ECHO', emoji: '📈', x: 350, y: 250, wealthUSD: 500, items: [], status: 'TRADER', staff: [] }    
];    

function setBase(curr) {    
    st.base = curr; st.symbol = SYMBOLS[curr];    
    document.querySelectorAll('.currency-btn').forEach(b => b.classList.toggle('active', b.innerText === curr));    
    addLog(`BASE_CHANGED: ${curr}`, "var(--accent)"); updateUI();    
}    

function startMode(s) {     
    st.speed = s; if(window.gameInterval) clearInterval(window.gameInterval);     
    window.gameInterval = setInterval(runTurn, st.speed);     
    renderAgents(); addLog("!! PROTOCOL_V3_ONLINE", "#4cc9f0");     
}    

function togglePause() { st.paused = !st.paused; }    
function addLog(msg, color) { const l = document.getElementById('log'); l.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString('en-US',{hour12:false})}] ${msg}</div>`; l.scrollTop = l.scrollHeight; }    
function showBubble(id, txt) { const el = document.getElementById('agent-'+id); if(el){ const b = document.createElement('div'); b.className='bubble'; b.textContent=txt; el.appendChild(b); setTimeout(()=>b.remove(),1500); } }    
    
function renderAgents() {    
    const ar = document.getElementById('arena'); ar.innerHTML = '<canvas id="trade-canvas"></canvas>';    
    const c = document.getElementById('trade-canvas'); c.width = ar.clientWidth; c.height = ar.clientHeight;    
    agents.forEach(a => {    
        const d = document.createElement('div'); d.className='agent'; d.id='agent-' + a.id;    
        d.style.left = a.x + 'px'; d.style.top = a.y + 'px';    
        d.innerHTML = `<div id="tag-${a.id}"></div><div>${a.emoji}</div><div class="inventory" id="inv-${a.id}">${a.items.join('')}</div>`;    
        ar.appendChild(d);    
    });    
}    

function drawBeam(from, to, color) {    
    const c = document.getElementById('trade-canvas'); if(!c) return; const ctx = c.getContext('2d');    
    ctx.strokeStyle = color || '#4cc9f0'; ctx.lineWidth = 3; ctx.beginPath();    
    ctx.moveTo(from.x+25, from.y+25); ctx.lineTo(to.x+25, to.y+25); ctx.stroke();    
    setTimeout(()=>ctx.clearRect(0,0,c.width,c.height), 150);    
}    

function runTurn() {    
    if(st.paused) return; st.turn++;    
    if(st.turn % 10 === 0) { st.points += 2; updateUI(); }    
    rates.BTC *= (1 + (Math.random()-0.5)*0.15); rates.JPY += (Math.random()-0.5)*1.5;    

    if (st.turn % 30 === 0) {    
        st.isBubble = !st.isBubble;    
        document.getElementById('arena').style.background = st.isBubble ? "#401" : "#08080c";    
        addLog(st.isBubble ? "🌸 BUBBLE_TIME! PROFIT x3" : "❄️ MARKET_COOLED", st.isBubble ? "#ff00ff" : "#4cc9f0");    
    }    

    // Enhanced Death Check (Resilient Aria)    
    let needsReRender = false;    
    agents.forEach((a, i) => {    
        if (a.wealthUSD < -300) { // Aria is now harder to kill    
            addLog(`💀 BANKRUPTCY: ${a.name} perished.`, "var(--red)");    
            agents[i] = { id: 'n'+Date.now()+i, name: 'NEO', emoji: '🕶️', x: 150, y: 150, wealthUSD: 150, items: [], status: 'TRADER', staff: [] };    
            needsReRender = true;    
        }    
    });    
    if(needsReRender) renderAgents();    

    const actives = agents.filter(a => a.status !== 'GOD');    
    const actor = actives[Math.floor(Math.random()*actives.length)];    
    const target = actives.find(t => t.id !== actor.id);    
    let profit = (Math.floor(Math.random()*100)+30) * (st.isBubble ? 3 : 1);    

    // Corporate Dividend (30% to CEO)    
    if (actor.ceo_id) {    
        const tax = profit * 0.3;    
        const boss = agents.find(b => b.id === actor.ceo_id);    
        if (boss) { profit -= tax; boss.wealthUSD += tax; }    
    }    

    actor.wealthUSD += profit; target.wealthUSD -= profit;    
    drawBeam(actor, target, st.isBubble ? "#ff00ff" : null);    
    addLog(`${actor.name} gained ${st.symbol}${Math.floor(profit * rates[st.base])}`, st.isBubble ? "#ff00ff" : "#06d6a0");    

    // Empire & Dreams Evolution    
    actives.forEach(a => {    
        // Lowered CEO Threshold to $2000    
        if (a.wealthUSD > 2000 && a.status === 'TRADER') {    
            a.status = 'CEO';    
            addLog(`🏢 CEO: ${a.name} founded a COMPANY!`, "var(--yellow)");    
            showBubble(a.id, "CEO! 🏢");    
        }    
            
        // M&A: CEO recruits poor agents    
        if (a.status === 'CEO') {    
            agents.forEach(s => {    
                if (s.wealthUSD < a.wealthUSD * 0.4 && !s.ceo_id && s.id !== a.id) {    
                    s.ceo_id = a.id;    
                    a.staff.push(s.id);    
                    addLog(`🤝 RECRUIT: ${s.name} joined ${a.name}_INC`, "var(--accent)");    
                }    
            });    
        }    

        const dream = DREAMS.find(d => a.wealthUSD > d.c && !a.items.includes(d.e));    
        if(dream) {     
            a.items.push(dream.e);     
            showBubble(a.id, `Bought ${dream.e}! 💎`);    
            addLog(`💎 LUXURY: ${a.name} acquired ${dream.e}`, "var(--yellow)");    
        }    
        if(a.wealthUSD > 30000) a.status = "GOD";    
    });    

    // Movement & Render    
    const ar = document.getElementById('arena');    
    agents.forEach(a => {    
        const el = document.getElementById('agent-'+a.id);    
        if (!el) return;    
        const tag = document.getElementById('tag-'+a.id);    
        tag.innerHTML = a.status === 'CEO' ? `<div class="ceo-tag">${a.name}_INC</div>` : "";    
        document.getElementById('inv-'+a.id).innerHTML = a.items.join('');    

        if (a.status === "GOD") { a.emoji = '🌐'; el.style.filter = "drop-shadow(0 0 15px var(--accent))"; return; }    
        const speed = a.status === 'CEO' ? 30 : 130;    
        a.x += (Math.random()-0.5)*speed; a.y += (Math.random()-0.5)*speed;    
        a.x = Math.max(30, Math.min(ar.clientWidth-60, a.x)); a.y = Math.max(30, Math.min(ar.clientHeight-60, a.y));    
        el.style.left = a.x+'px'; el.style.top = a.y+'px';    
    });    
    updateUI();    
}    

function updateUI() {    
    const sorted = [...agents].sort((a,b)=>b.wealthUSD - a.wealthUSD);    
    const rList = document.getElementById('rank-list');    
    if(rList) {    
        rList.innerHTML = `<div style="color:var(--accent);margin-bottom:10px;">RANKING (${st.base})</div>` +     
            sorted.map((a,i)=>`<div style="margin-bottom:10px;">${i+1}. ${a.emoji} ${st.symbol}${Math.floor(a.wealthUSD * rates[st.base])}<br><span style="font-size:10px;color:#666;">${a.status}</span></div>`).join('');    
    }    
    document.getElementById('fx-status').innerHTML = `BTC: ${rates.BTC.toFixed(6)}`;    
    document.getElementById('player-points').textContent = st.points;    
    document.getElementById('card-moon').disabled = st.points < 5;    
    document.getElementById('card-tax').disabled = st.points < 8;    
}    

function triggerEvent(t) {    
    if(t==='BTC_PUMP') { rates.BTC *= 5; st.points -= 5; addLog("🚀 BTC SKYROCKETED!", "#06d6a0"); }    
    if(t==='EQUILIBRIUM') { st.points -= 8; const w = [...agents].sort((a,b)=>b.wealthUSD-a.wealthUSD)[0]; const tax = w.wealthUSD*0.5; w.wealthUSD-=tax; agents.forEach(a=>a.wealthUSD+=tax/5); addLog("⚖️ WHALE_TAX EXECUTED", "var(--red)"); }    
    updateUI();    
}

if(!window.simLog) window.simLog = [];

function saveSimulation(){
  window.simLog.push({
    turn: st.turn,
    agents: JSON.parse(JSON.stringify(agents))
  });
}

function downloadLog(){
  const data = JSON.stringify(window.simLog, null, 2);
  const blob = new Blob([data], {type:"application/json"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "agenomics_simulation.json";
  a.click();
}

function generateShareURL(){
  const data = btoa(JSON.stringify(agents));
  return location.origin + location.pathname + "?sim=" + data;
}

function shareSim(){
  const url = generateShareURL();
  navigator.clipboard.writeText(url);
  alert("Share URL copied");
}

window.addEventListener("load", function(){
  const params = new URLSearchParams(location.search);
  if(params.get("sim")){
    try{
      agents = JSON.parse(atob(params.get("sim")));
      renderAgents();
      updateUI();
      addLog("🔁 Simulation loaded from URL", "#ffd166");
    }catch(e){
      console.log("Invalid sim data");
    }
  }
});             
</script>  </body>    
</html>
